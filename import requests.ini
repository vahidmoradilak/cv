import requests
from bs4 import BeautifulSoup

def crawl_website(url):
    try:
        # ارسال درخواست HTTP و دریافت محتوای صفحه
        response = requests.get(url)
        response.raise_for_status()  # بررسی خطاهای احتمالی
        
        # تجزیه محتوای HTML با BeautifulSoup
        soup = BeautifulSoup(response.text, 'html.parser')
        
        # اینجا می‌توانید عناصر مورد نظر خود را استخراج کنید
        # برای مثال:
        title = soup.title.string if soup.title else "بدون عنوان"
        
        # چاپ اطلاعات
        print(f"عنوان صفحه: {title}")
        
        # می‌توانید سایر اطلاعات مورد نیاز را هم استخراج کنید
        
    except requests.RequestException as e:
        print(f"خطا در کرال سایت: {e}")
        
# مثال استفاده
url = "https://farsi.khamenei.ir/treatise-index"  # آدرس سایت مورد نظر را اینجا وارد کنید
crawl_website(url)
# استخراج تمام لینک‌های صفحه
links = soup.find_all('a')
print("\nلینک‌های موجود در صفحه:")
for link in links:
    href = link.get('href')
    text = link.text.strip()
    if href and text:
        print(f"متن لینک: {text}")
        print(f"آدرس لینک: {href}")
        print("-" * 50)

# استخراج تمام پاراگراف‌های متنی
paragraphs = soup.find_all('p')
print("\nمتن‌های موجود در صفحه:")
for p in paragraphs:
    text = p.text.strip()
    if text:
        print(text)
        print("-" * 50)

# استخراج تمام تصاویر
images = soup.find_all('img')
print("\nتصاویر موجود در صفحه:")
for img in images:
    src = img.get('src')
    alt = img.get('alt', 'بدون توضیحات')
    if src:
        print(f"آدرس تصویر: {src}")
        print(f"توضیحات تصویر: {alt}")
        print("-" * 50)

# استخراج تمام جداول
tables = soup.find_all('table')
print("\nجداول موجود در صفحه:")
for table in tables:
    print(table)
    print("-" * 50)

print(soup.prettify())

